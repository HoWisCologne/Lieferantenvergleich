name: Build & Release

# Baut Windows- und Mac-Installer und veröffentlicht sie als GitHub-Release,
# sobald ein Versions-Tag (z. B. v1.0.1) gepusht wird.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Bauen & veröffentlichen
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Ohne Code-Signatur bauen (Variante A)
          CSC_IDENTITY_AUTO_DISCOVERY: false
